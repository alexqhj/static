<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plyo Dev Toolkit</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #da7756;
      --accent-soft: rgba(218, 119, 86, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 2rem 1rem;
      min-height: 100vh;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2.5rem;
    }

    .logo {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    header p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .section {
      margin-bottom: 2rem;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .card-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .card {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, background 0.2s;
    }

    .card:hover {
      border-color: var(--accent);
      background: #1a2030;
    }

    .card-icon {
      flex-shrink: 0;
      width: 2rem;
      height: 2rem;
      background: var(--accent-soft);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      margin-top: 0.1rem;
    }

    .card-body h3 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.15rem;
    }

    .card-body p {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .tag {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      margin-top: 0.4rem;
    }

    .tag-wsl {
      background: rgba(56, 139, 253, 0.15);
      color: #58a6ff;
    }

    .tag-claude {
      background: var(--accent-soft);
      color: var(--accent);
    }

    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.78rem;
      text-align: center;
    }

    footer a {
      color: var(--text-muted);
      text-decoration: none;
    }

    footer a:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">Plyo</div>
      <h1>Dev Toolkit</h1>
      <p>Guides and setup scripts for the team. Paste prompts directly into Claude Code.</p>
    </header>

    <div class="section">
      <div class="section-label">Claude Code Setup</div>
      <div class="card-list">
        <a href="wsl-notifications.html" class="card">
          <div class="card-icon">🔔</div>
          <div class="card-body">
            <h3>WSL Notifications</h3>
            <p>Get Windows toast notifications when Claude Code needs your attention. One-paste setup.</p>
            <span class="tag tag-wsl">WSL</span>
            <span class="tag tag-claude">Claude Code</span>
          </div>
        </a>
      </div>
    </div>

    <!--
    <div class="section">
      <div class="section-label">Workflows</div>
      <div class="card-list">
        <a href="#" class="card">
          <div class="card-icon">📋</div>
          <div class="card-body">
            <h3>Example Guide</h3>
            <p>Description of the guide goes here.</p>
          </div>
        </a>
      </div>
    </div>
    -->

    <footer>
      <a href="https://github.com/alexqhj/static">github.com/alexqhj/static</a>
    </footer>
  </div>
</body>
</html>
